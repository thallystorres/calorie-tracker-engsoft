{% extends "base.html" %} {% block content %}
<div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div
    class="w-full max-w-xl bg-white rounded-3xl shadow-sm border border-slate-100 p-8 sm:p-10"
  >
    <h1 class="text-3xl font-bold text-slate-900 mb-3">Redefinir senha</h1>
    <p class="text-slate-500 mb-8">
      Informe seu e-mail para receber as instruções de redefinição.
    </p>

    <form
      hx-post="{% url 'accounts:password-reset-request' %}"
      class="space-y-5"
      data-success-redirect="{% url 'accounts-ui:password-reset-request-done' %}"
    >
      <div data-feedback="api-feedback"></div>

      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700 ml-1">E-mail</label>
        <input
          type="email"
          name="email"
          required
          class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
        />
        <p
          class="hidden mt-1 text-xs font-medium text-red-600"
          data-error-for="email"
        ></p>
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all"
      >
        Enviar instruções
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
      Lembrou sua senha?
      <a href="{% url 'accounts-ui:login' %}" class="font-bold text-emerald-600"
        >Voltar para login</a
      >
    </div>
  </div>
</div>
{% endblock %}
