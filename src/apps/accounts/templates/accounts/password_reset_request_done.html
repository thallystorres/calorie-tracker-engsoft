{% extends "base.html" %} {% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="w-full max-w-lg bg-white rounded-3xl shadow-sm border border-slate-100 p-8 text-center"
  >
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Verifique seu e-mail</h1>
    <p class="text-slate-500 mb-6">
      Se o e-mail informado estiver cadastrado, voce recebera instrucoes para
      redefinir sua senha.
    </p>

    <div class="space-y-3">
      <a
        href="{% url 'accounts-ui:login' %}"
        class="w-full inline-block py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all"
        >Ir para login</a
      >
      <a
        href="{% url 'accounts-ui:password-reset-request' %}"
        class="w-full inline-block py-3 rounded-xl font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100"
        >Solicitar novamente</a
      >
    </div>
  </div>
</div>
{% endblock %}
