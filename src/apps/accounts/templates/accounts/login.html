{% extends "base.html" %} {% block content %}
<div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div
    class="w-full max-w-[1200px] bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col lg:flex-row lg:h-[760px]"
  >
    <div
      class="hidden lg:flex lg:w-5/12 relative bg-emerald-950 overflow-hidden"
    >
      <img
        src="https://images.unsplash.com/photo-1670164747721-d3500ef757a6?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
        class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-overlay"
      />
      <div
        class="absolute inset-0 bg-gradient-to-br from-emerald-900/90 via-emerald-800/80 to-emerald-950/95"
      ></div>
      <div class="relative z-10 p-12 flex flex-col h-full justify-between">
        <div class="flex items-center gap-3">
          <div
            class="bg-white/10 backdrop-blur-md p-2.5 rounded-2xl border border-white/20"
          >
            <span class="font-bold text-white">cIA</span>
          </div>
          <span class="text-3xl font-bold text-white">calorIA</span>
        </div>
        <div>
          <h2 class="text-4xl font-semibold leading-tight mb-4 text-white">
            Nutra seu corpo <br /><span
              class="text-emerald-300 italic font-light"
              >com inteligência.</span
            >
          </h2>
        </div>
      </div>
    </div>

    <div class="w-full lg:w-7/12 p-8 sm:p-14 flex flex-col justify-center">
      <div class="w-full max-w-[420px] mx-auto">
        <div class="mb-10">
          <h1 class="text-4xl font-bold text-slate-900 mb-3">Bem-vindo</h1>
          <p class="text-slate-500">Acesse seu painel inteligente.</p>
        </div>

        <form
          hx-post="{% url 'accounts:login' %}"
          class="space-y-6"
          data-success-redirect="{% url 'accounts-ui:profile' %}"
        >
          <div data-feedback="api-feedback"></div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1"
              >Usuário ou E-mail</label
            >
            <input
              type="text"
              name="username_or_email"
              required
              class="block w-full px-4 py-4 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
            />
            <p
              class="hidden mt-1 text-xs font-medium text-red-600"
              data-error-for="username_or_email"
            ></p>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1"
              >Senha</label
            >
            <input
              type="password"
              name="password"
              required
              class="block w-full px-4 py-4 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
            />
            <p
              class="hidden mt-1 text-xs font-medium text-red-600"
              data-error-for="password"
            ></p>
          </div>

          <div class="text-right">
            <a
              href="{% url 'accounts-ui:password-reset-request' %}"
              class="text-sm font-semibold text-emerald-700 hover:text-emerald-800"
              >Esqueci minha senha</a
            >
          </div>

          <button
            type="submit"
            class="w-full py-4 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all mt-4"
          >
            Entrar
          </button>
        </form>

        <div class="mt-12 text-center text-slate-500">
          Novo no calorIA?
          <a
            href="{% url 'accounts-ui:register' %}"
            class="font-bold text-emerald-600"
            >Crie uma conta</a
          >
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
