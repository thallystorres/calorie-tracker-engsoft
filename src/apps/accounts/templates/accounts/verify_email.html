{% extends "base.html" %} {% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div
    class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-slate-100 p-8 text-center"
  >
    <h1 class="text-2xl font-bold text-slate-900 mb-2">
      Verificacao de e-mail
    </h1>
    <p class="text-slate-500 mb-6">Estamos validando seu link de ativacao.</p>

    <form
      hx-get="{% url 'accounts:activate' %}?token={{ token }}"
      class="space-y-4"
      data-success-redirect="{% url 'accounts-ui:login' %}"
    >
      <div data-feedback="api-feedback"></div>
      <button
        type="submit"
        class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all"
      >
        Validar link
      </button>
    </form>

    <div class="mt-6 text-sm text-slate-500">
      Se o link estiver expirado ou invalido, faca um novo cadastro para receber
      outro e-mail.
    </div>

    <div class="mt-6">
      <a
        href="{% url 'accounts-ui:register' %}"
        class="w-full inline-block py-3 rounded-xl font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100"
        >Voltar ao cadastro</a
      >
    </div>
  </div>
</div>
{% endblock %}
