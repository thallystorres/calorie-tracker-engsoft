{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-slate-100 p-8 text-center">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Validando Conta</h1>
    <p class="text-slate-500 mb-6">Aguarde um instante...</p>

    <div id="form-feedback" hx-get="{% url 'accounts:activate' %}?token={{ request.GET.token }}" hx-trigger="load" class="flex justify-center">
        <svg class="animate-spin h-8 w-8 text-emerald-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    </div>

    <div class="mt-8">
      <a href="{% url 'accounts-ui:login' %}" class="w-full inline-block py-3 rounded-xl font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100">Ir para o Login</a>
    </div>
  </div>
</div>
{% endblock %}
