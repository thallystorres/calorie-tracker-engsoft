{% extends "base.html" %} {% block content %}
<div class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold text-slate-900">Meu Perfil</h1>
      <button
        hx-post="{% url 'accounts:logout' %}"
        hx-swap="none"
        onclick="setTimeout(()=>window.location.href='{% url 'accounts-ui:login' %}', 500)"
        class="text-slate-500 hover:text-red-600 font-medium transition-colors"
      >
        Sair da Conta
      </button>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 p-8">
      <form hx-patch="{% url 'accounts:me' %}" class="space-y-6">
        <div data-feedback="api-feedback"></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1"
              >Nome</label
            >
            <input
              type="text"
              name="first_name"
              value="{{ user.first_name }}"
              class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
            />
            <p
              class="hidden mt-1 text-xs font-medium text-red-600"
              data-error-for="first_name"
            ></p>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-semibold text-slate-700 ml-1"
              >Sobrenome</label
            >
            <input
              type="text"
              name="last_name"
              value="{{ user.last_name }}"
              class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
            />
            <p
              class="hidden mt-1 text-xs font-medium text-red-600"
              data-error-for="last_name"
            ></p>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1"
            >Usuário</label
          >
          <input
            type="text"
            value="{{ user.username }}"
            disabled
            class="block w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-500"
          />
        </div>

        <div class="space-y-1.5">
          <label class="text-sm font-semibold text-slate-700 ml-1"
            >E-mail</label
          >
          <input
            type="email"
            name="email"
            value="{{ user.email }}"
            class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
          />
          <p
            class="hidden mt-1 text-xs font-medium text-red-600"
            data-error-for="email"
          ></p>
        </div>

        <div class="text-sm text-slate-500">
          Conta criada em: {{ user.date_joined|date:"d/m/Y H:i" }}
        </div>

        <button
          type="submit"
          class="w-full sm:w-auto px-8 py-3 mt-4 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all"
        >
          Salvar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
