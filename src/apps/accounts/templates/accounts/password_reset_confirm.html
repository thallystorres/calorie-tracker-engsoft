{% extends "base.html" %} {% block content %}
<div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div
    class="w-full max-w-xl bg-white rounded-3xl shadow-sm border border-slate-100 p-8 sm:p-10"
  >
    <h1 class="text-3xl font-bold text-slate-900 mb-3">Definir nova senha</h1>
    <p class="text-slate-500 mb-8">Crie uma nova senha para a sua conta.</p>

    <form
      hx-post="{% url 'accounts:password-reset-confirm' %}?token={{ token }}"
      class="space-y-5"
      data-success-redirect="{% url 'accounts-ui:password-reset-success' %}"
    >
      <div data-feedback="api-feedback"></div>

      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700 ml-1"
          >Nova senha</label
        >
        <input
          type="password"
          name="new_password"
          id="new-password"
          required
          class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
        />
        <p
          class="hidden mt-1 text-xs font-medium text-red-600"
          data-error-for="new_password"
        ></p>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-semibold text-slate-700 ml-1"
          >Confirmar nova senha</label
        >
        <input
          type="password"
          name="confirm_password"
          required
          class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-emerald-500 rounded-xl"
        />
        <p
          class="hidden mt-1 text-xs font-medium text-red-600"
          data-error-for="confirm_password"
        ></p>
      </div>

      <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mt-2">
        <p class="text-xs font-semibold text-slate-700 mb-2">
          A senha deve conter:
        </p>
        <ul class="text-xs space-y-1.5 text-slate-500" id="password-checklist">
          <li
            id="req-length"
            class="flex items-center gap-2 transition-colors duration-200"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
            </svg>
            Mínimo de 8 caracteres
          </li>
          <li
            id="req-upper"
            class="flex items-center gap-2 transition-colors duration-200"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
            </svg>
            Letra maiúscula
          </li>
          <li
            id="req-lower"
            class="flex items-center gap-2 transition-colors duration-200"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
            </svg>
            Letra minúscula
          </li>
          <li
            id="req-number"
            class="flex items-center gap-2 transition-colors duration-200"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
            </svg>
            Número
          </li>
          <li
            id="req-special"
            class="flex items-center gap-2 transition-colors duration-200"
          >
            <svg
              class="w-4 h-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4" fill="currentColor"></circle>
            </svg>
            Caractere especial
          </li>
        </ul>
      </div>

      <button
        type="submit"
        class="w-full py-3 rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-all"
      >
        Salvar nova senha
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-slate-500">
      <a
        href="{% url 'accounts-ui:password-reset-request' %}"
        class="font-bold text-emerald-600"
        >Solicitar novo link</a
      >
    </div>
  </div>
</div>

<script>
  document
    .getElementById("new-password")
    .addEventListener("input", function (e) {
      const p = e.target.value;
      const rules = [
        { id: "req-length", valid: p.length >= 8 },
        { id: "req-upper", valid: /[A-Z]/.test(p) },
        { id: "req-lower", valid: /[a-z]/.test(p) },
        { id: "req-number", valid: /[0-9]/.test(p) },
        { id: "req-special", valid: /[^A-Za-z0-9]/.test(p) },
      ];

      const iconDot =
        '<circle cx="12" cy="12" r="4" fill="currentColor"></circle>';
      const iconCheck =
        '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>';

      rules.forEach(function (rule) {
        const el = document.getElementById(rule.id);
        const svg = el.querySelector("svg");
        if (rule.valid) {
          el.classList.replace("text-slate-500", "text-emerald-600");
          svg.classList.replace("text-slate-400", "text-emerald-500");
          svg.innerHTML = iconCheck;
        } else {
          el.classList.replace("text-emerald-600", "text-slate-500");
          svg.classList.replace("text-emerald-500", "text-slate-400");
          svg.innerHTML = iconDot;
        }
      });
    });
</script>
{% endblock %}
