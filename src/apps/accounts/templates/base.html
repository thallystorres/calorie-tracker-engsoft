<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calorIA - Inteligência Nutricional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
    </style>
</head>
<body class="antialiased bg-[#F8FAFC]">

    {% block content %}
    {% endblock %}

    <script>
        //injeta o CSRF Token em todas as requisições do HTMX
        document.body.addEventListener('htmx:configRequest', (event) => {
            event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
        });

        //transforma as respostas JSON da API em alertas HTML
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.target.id === 'form-feedback') {
                const xhr = evt.detail.xhr;
                const target = evt.detail.target;

                try {
                    const response = JSON.parse(xhr.responseText);

                    // extrai erros de validação específicos ou a mensagem geral
                    let message = response.detail;
                    if (!message) {
                        // tenta extrair o primeiro erro de validação (ex: {"email": ["E-mail já está em uso."]})
                        const firstKey = Object.keys(response)[0];
                        message = Array.isArray(response[firstKey]) ? response[firstKey][0] : response[firstKey];
                    }
                    message = message || "Erro ao processar requisição.";

                    if (xhr.status >= 400) {
                        target.innerHTML = `<div class="bg-red-50 text-red-600 p-3 rounded-xl border border-red-100 flex items-center gap-2 text-sm font-medium"><svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span>${message}</span></div>`;
                    } else {
                        target.innerHTML = `<div class="bg-emerald-50 text-emerald-700 p-3 rounded-xl border border-emerald-200 flex items-center gap-2 text-sm font-medium"><svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>${message}</span></div>`;

                        if (xhr.status === 200 && window.location.pathname.includes('login')) {
                            setTimeout(() => window.location.href = "{% url 'accounts:profile-ui' %}", 1000);
                        } else if (xhr.status === 200 && window.location.pathname.includes('me')) {
                            if (message.includes('encerrada')) {
                                setTimeout(() => window.location.href = "{% url 'accounts:login-ui' %}", 3000);
                            }
                        }
                    }
                } catch (e) {
                    target.innerHTML = `<div class="bg-red-50 text-red-600 p-3 rounded-xl border border-red-100 text-sm font-medium">Erro de conexão com o servidor.</div>`;
                }
            }
        });
    </script>
</body>
</html>
