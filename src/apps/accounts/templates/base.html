<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calorIA - Inteligência Nutricional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <style>
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 7s infinite;
      }
      .animation-delay-2000 {
        animation-delay: 2s;
      }
    </style>
  </head>
  <body class="antialiased bg-[#F8FAFC]">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">

          <div class="flex items-center">
            <a href="{% url 'accounts-ui:profile' %}" class="text-2xl font-black text-emerald-600 tracking-tighter">
              CalorAI
            </a>
          </div>

          {% if user.is_authenticated %}
          <div class="flex items-center space-x-6">

            <a href="{% url 'accounts-ui:profile' %}"
               class="text-sm font-semibold {% if request.resolver_match.url_name == 'profile' %}text-emerald-600{% else %}text-slate-500 hover:text-emerald-500{% endif %} transition-colors">
              Dados da Conta
            </a>

            <a href="{% url 'accounts-ui:nutritional-profile' %}"
               class="text-sm font-semibold {% if request.resolver_match.url_name == 'nutritional-profile' %}text-emerald-600{% else %}text-slate-500 hover:text-emerald-500{% endif %} transition-colors">
              Perfil Nutricional
            </a>

            <a href="{% url 'accounts-ui:tracker' %}"
               class="text-sm font-semibold {% if request.resolver_match.url_name == 'tracker' %}text-emerald-600{% else %}text-slate-500 hover:text-emerald-500{% endif %} transition-colors">
              Diário (Tracker)
            </a>

            <button
              hx-post="{% url 'accounts:logout' %}"
              hx-swap="none"
              onclick="setTimeout(()=>window.location.href='{% url 'accounts-ui:login' %}', 500)"
              class="text-sm font-bold text-slate-500 hover:text-red-600 transition-colors ml-4 pl-4 border-l border-slate-200">
              Sair
            </button>
          </div>
          {% else %}
          <div class="flex items-center space-x-4">
            <a href="{% url 'accounts-ui:login' %}" class="text-sm font-semibold text-slate-600 hover:text-emerald-600">Entrar</a>
            <a href="{% url 'accounts-ui:register' %}" class="text-sm font-bold text-white bg-emerald-600 px-4 py-2 rounded-lg hover:bg-emerald-700 transition-colors">Criar Conta</a>
          </div>
          {% endif %}

        </div>
      </div>
    </nav>

    <main>
      {% block content %} {% endblock %}
    </main>

    <script>
      document.body.addEventListener("htmx:configRequest", function (event) {
        event.detail.headers["X-CSRFToken"] = "{{ csrf_token }}";
      });

      function normalizeMessage(value) {
        if (Array.isArray(value)) {
          return String(value[0] || "");
        }
        return String(value || "");
      }

      function clearFieldErrors(form) {
        const fields = form.querySelectorAll("[data-error-for]");
        fields.forEach(function (el) {
          el.textContent = "";
          el.classList.add("hidden");
        });
      }

      function renderFieldErrors(form, payload) {
        let hasFieldError = false;
        Object.keys(payload || {}).forEach(function (key) {
          if (key === "detail" || key === "user") {
            return;
          }
          const target = form.querySelector('[data-error-for="' + key + '"]');
          if (!target) {
            return;
          }
          target.textContent = normalizeMessage(payload[key]);
          target.classList.remove("hidden");
          hasFieldError = true;
        });
        return hasFieldError;
      }

      function feedbackMarkup(kind, message) {
        if (kind === "error") {
          return (
            '<div class="bg-red-50 text-red-700 p-3 rounded-xl border border-red-200 text-sm font-medium">' +
            message +
            "</div>"
          );
        }
        return (
          '<div class="bg-emerald-50 text-emerald-700 p-3 rounded-xl border border-emerald-200 text-sm font-medium">' +
          message +
          "</div>"
        );
      }

      function handleRedirect(form) {
        const successPath = form.getAttribute("data-success-redirect");
        if (successPath) {
          setTimeout(function () {
            window.location.href = successPath;
          }, 900);
        }
      }

      document.body.addEventListener("htmx:beforeRequest", function (evt) {
        const form = evt.target.closest("form");
        if (!form) {
          return;
        }
        const submitButton = form.querySelector('button[type="submit"]');
        if (submitButton) {
          submitButton.disabled = true;
          submitButton.classList.add("opacity-70", "cursor-not-allowed");
          submitButton.setAttribute("aria-busy", "true");
        }
        clearFieldErrors(form);
      });

      document.body.addEventListener("htmx:beforeSwap", function (evt) {
        const elt = evt.detail.elt;
        const form = elt && elt.closest ? elt.closest("form") : null;
        if (!form) {
          return;
        }

        const hasJsonFeedbackTarget =
          form.querySelector('[data-feedback="api-feedback"]') ||
          form.querySelector("#form-feedback");

        if (!hasJsonFeedbackTarget) {
          return;
        }

        evt.detail.shouldSwap = false;
        evt.detail.isError = false;
      });

      document.body.addEventListener("htmx:afterRequest", function (evt) {
        const form = evt.target.closest("form");
        if (!form) {
          return;
        }

        const submitButton = form.querySelector('button[type="submit"]');
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.classList.remove("opacity-70", "cursor-not-allowed");
          submitButton.removeAttribute("aria-busy");
        }

        const feedback =
          form.querySelector('[data-feedback="api-feedback"]') ||
          form.querySelector("#form-feedback");
        if (!feedback) {
          return;
        }

        let payload = {};
        try {
          payload = JSON.parse(evt.detail.xhr.responseText || "{}");
        } catch (err) {
          feedback.innerHTML = feedbackMarkup(
            "error",
            "Erro de conexão com o servidor.",
          );
          return;
        }

        if (evt.detail.xhr.status >= 400) {
          const hasFieldError = renderFieldErrors(form, payload);
          if (!hasFieldError) {
            const message =
              normalizeMessage(payload.detail) ||
              "Erro ao processar requisição.";
            feedback.innerHTML = feedbackMarkup("error", message);
          } else {
            const message =
              normalizeMessage(payload.detail) ||
              "Corrija os campos destacados.";
            feedback.innerHTML = feedbackMarkup("error", message);
          }
          return;
        }

        const message =
          normalizeMessage(payload.detail) || "Operação realizada com sucesso.";
        feedback.innerHTML = feedbackMarkup("success", message);
        handleRedirect(form);
      });
    </script>
  </body>
</html>
